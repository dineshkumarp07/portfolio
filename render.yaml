services:
  - type: web
    name: portfolio-dk
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - route: /
        dest: /index.html
    headers:
      - path: /**
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /**/*.{js,css,png,jpg,jpeg,svg,ico,woff2}
        name: Cache-Control
        value: public, max-age=31536000, immutable
